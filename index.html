<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Solar Quote Tool</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" href="icon.png">
<title>Your Business Name - Solar Tool</title>
<meta name="apple-mobile-web-app-title" content="Solar Tool">
<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<style>
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 15px;
}

#brandLogo {
  width: 50px;
  height: 50px;
  border-radius: 10px;
}

.titleBlock h1 {
  font-size: 18px;
  margin: 0;
}

.titleBlock p {
  font-size: 12px;
  margin: 0;
  color: #666;
}
body
  {
  font-family: Arial;
  max-width: 480px;
  margin: auto;
  padding: 15px;
  background: #f4f6f8;
}
h2 { text-align: center; }

input, select {
  width: 100%;
  padding: 12px;
  margin: 6px 0 12px;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 14px;
  background: #2c7be5;
  color: white;
  border: none;
  border-radius: 8px;
}
.button-group {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.result {
  margin-top: 20px;
  background: white;
  padding: 15px;
  border-radius: 10px;
}

.logo {
  max-width: 120px;
  margin-bottom: 10px;
}
  .card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}
</style>
</head>

<body>
<div class="header">
  <img id="brandLogo" src="icon.png" alt="Logo">
  <div class="titleBlock">
    <h1>Haymans Electrical Caloundra</h1>
    <p>Solar Install Calculator</p>
  </div>
</div>
<h2>Solar Quote Tool</h2>
<div class="card">
  <!-- all your inputs here -->

<label>Job Reference</label>
<input id="jobRef" placeholder="e.g. Smith 6.6kW">

<label>Upload Logo</label>
<input type="file" id="logoInput">

<label>Panels per Row</label>
<input id="panelsPerRow" type="number" value="4">

<label>Rows</label>
<input id="rows" type="number" value="1">

<label>Panel Width (mm)</label>
<input id="panelWidth" type="number" value="1134">

<label>Panel Length (mm)</label>
<input id="panelLength" type="number" value="1762">

<label>Orientation</label>
<select id="orientation">
  <option value="portrait">Portrait</option>
  <option value="landscape">Landscape</option>
</select>

<label>Roof Type</label>
<select id="roofType">
  <option value="metal">Metal</option>
  <option value="tile">Tile</option>
</select>

<label>Foot Spacing</label>
<select id="spacing">
  <option value="900">900mm</option>
  <option value="1200" selected>1200mm</option>
</select>

<label>Rail Length (mm)</label>
<input id="railLength" value="4700">
<div class="button-group">
  <button onclick="calculate()">Generate BOM</button>
  <button onclick="downloadPDF()">Download PDF</button>
</div>

</div>

<div class="result" id="output"></div>

<script>
function calculate() {

  let panelsPerRow = +document.getElementById("panelsPerRow").value;
  let rows = +document.getElementById("rows").value;
  let width = +document.getElementById("panelWidth").value;
  let length = +document.getElementById("panelLength").value;
  let orientation = document.getElementById("orientation").value;
  let roofType = document.getElementById("roofType").value;
  let spacing = +document.getElementById("spacing").value;
  let railLength = +document.getElementById("railLength").value;
  let jobRef = document.getElementById("jobRef").value;

  let panelSpan = (orientation === "portrait") ? width : length;
  let totalPanels = panelsPerRow * rows;

  // CLAMPS
  let midClamps = (panelsPerRow - 1) * 2 * rows;
  let endClamps = 4 * rows;

  // RAILS
  let rowLength = panelsPerRow * panelSpan;
  let railsPerLine = Math.ceil(rowLength / railLength);
  let rails = railsPerLine * 2 * rows;

  // SPLICES
  let splices = (railsPerLine - 1) * 2 * rows;

  // FEET
  let feetPerRail = Math.ceil(railLength / spacing) + 1;
  let feet = feetPerRail * rails;

  // GROUND LUGS (1 per rail line pair)
  let groundingLugs = railsPerLine * rows;

  // PART NUMBERS
  let railPN = "CLNER-R-ELT/4700";
  let midPN = "CLNC-U/30/46-G";
  let endPN = "CLNER-EC-ST30";
  let tinPN = "CLNER-I-05";
  let tilePN = "CLNER-I-01";
  let lugPN = "CLNEZ-GL-AT";
  let splicePN = "CLNER-SP-ELT";

  let fixingPN = (roofType === "tile") ? tilePN : tinPN;

  // LOGO
  let logoFile = document.getElementById("logoInput").files[0];
  let logoURL = logoFile ? URL.createObjectURL(logoFile) : "";

  document.getElementById("output").innerHTML = `
    ${logoURL ? `<img src="${logoURL}" class="logo">` : ""}
    <b>${jobRef}</b><br><br>

    <b>System:</b><br>
    Panels: ${totalPanels}<br>
    Layout: ${panelsPerRow} x ${rows}<br><br>

    <b>BOM:</b><br>
    Rails (4700) — ${rails} (${railPN})<br>
    Mid Clamps — ${midClamps} (${midPN})<br>
    End Clamps — ${endClamps} (${endPN})<br>
    Splices — ${splices} (${splicePN})<br>
    Roof Fixings — ${feet} (${fixingPN})<br>
    Ground Lugs — ${groundingLugs} (${lugPN})
  `;
}
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
async function downloadPDF() {

  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();

  let jobRef = document.getElementById("jobRef").value || "Solar Quote";

  let panelsPerRow = +document.getElementById("panelsPerRow").value;
  let rows = +document.getElementById("rows").value;
  let totalPanels = panelsPerRow * rows;

  // Pull calculated values from screen
  let output = document.getElementById("output").innerText;

  // LOGO (optional)
  let logoFile = document.getElementById("logoInput").files[0];

  if (logoFile) {
    const reader = new FileReader();
    reader.onload = function(e) {

      doc.addImage(e.target.result, "PNG", 10, 8, 40, 15);

      buildPDF(doc, jobRef, totalPanels, output);
    };
    reader.readAsDataURL(logoFile);
  } else {
    buildPDF(doc, jobRef, totalPanels, output);
  }
}

function buildPDF(doc, jobRef, totalPanels, output) {

  // Title
  doc.setFontSize(18);
  doc.text("Solar Installation Material List", 10, 30);

  // Job reference
  doc.setFontSize(11);
  doc.text("Reference: " + jobRef, 10, 38);

  // Divider
  doc.line(10, 42, 200, 42);

  // System summary
  doc.setFontSize(12);
  doc.text("System Summary", 10, 50);
  doc.setFontSize(10);
  doc.text("Total Panels: " + totalPanels, 10, 56);

  // BOM section
  doc.setFontSize(12);
  doc.text("Bill of Materials", 10, 70);

  let lines = doc.splitTextToSize(output, 180);
  doc.setFontSize(10);
  doc.text(lines, 10, 78);

  // Footer
  doc.setFontSize(8);
  doc.text("Generated by Solar Tool", 10, 285);

  doc.save(jobRef + ".pdf");
}
</script>
</body>
</html>
